name: Unazed Spectaculum
description: software developer
avatar: https://avatars2.githubusercontent.com/u/29807271?s=460&v=4

url: https://unazed.github.io

baseurl: ""

permalink: /:title/

version: v1.2.0

kramdown:
  input: GFM
  syntax_highlighter: Pygments
  syntax_highlighter_opts:
    css_class: 'highlight'
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1
      
sass:
  style: :expanded 

gems:
  - jekyll-sitemap 
  - jekyll-feed 

exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - CNAME

theme: jekyll-theme-dinky
